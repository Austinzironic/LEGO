<td>&nbsp;</td><td valign="top" class="textblack">가로크는 아주 미끄럽습니다. 여러분은 결코 그 녀석들이 어디에 버티고 서 있는지 알 수 없습니다. 그들이 어디에 있는지 알아낼 방법을 궁리할 때 그들은 또 자리를 바꿉니다.<br><br>노카마가 한 이야기는 유명합니다. “가로크를 잡는 것은 젖은 손으로 뱀장어를 잡는 것과 같습니다. 그러므로 가로크를 가로막기 전에 미리 주의하십시오.” 그들은 같은 방향으로 두 번 움직이지 않고, 같은 곳을 두 번 공격하지 않습니다.<br><br><br></td>
